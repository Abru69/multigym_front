services:
  multigym-front:
    build:
      context: .
      args:
        VITE_MP_PUBLIC_KEY: ${VITE_MP_PUBLIC_KEY:-}
    container_name: multigym-front
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    networks:
      - multigym-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  multigym-network:
    external: true
